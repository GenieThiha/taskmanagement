<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TMA-2026 — Task Management</title>
    <!-- Dark-mode flash prevention: apply 'dark' class before first paint -->
    <script>
      (function () {
        try {
          var s = JSON.parse(localStorage.getItem('tma-theme') || '{}');
          if (s.state && s.state.isDark) {
            document.documentElement.classList.add('dark');
          }
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
